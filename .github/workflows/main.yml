name: Flashfood Bot

on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 Detroit
    - cron: "0 16 * * *"  # 12:00 Detroit
    - cron: "0 20 * * *"  # 16:00 Detroit

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Загрузка current state
      - name: Load seen.txt from state
        run: |
          git fetch origin state || true
          git checkout origin/state -- flash/seen.txt || echo "No existing state"

      # ✅ Maven cache
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('flash/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn package -q
        working-directory: flash

      - name: Run bot
        working-directory: flash
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FF_USERNAME: ${{ secrets.FF_USERNAME }}
          FF_PASSWORD: ${{ secrets.FF_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: java -jar target/*.jar

      # ✅ SAFE STATE SAVE (финальный стабильный вариант)
      - name: Save seen.txt to state branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # сохраняем текущий seen.txt
          cp flash/seen.txt /tmp/seen.txt

          # берём свежий state
          git fetch origin state || true

          # создаём/обновляем branch
          if git show-ref --verify --quiet refs/remotes/origin/state; then
            git checkout -B state origin/state
          else
            git checkout -B state
          fi

          # очищаем рабочее дерево
          git reset --hard
          git clean -fd

          # возвращаем файл
          mkdir -p flash
          cp /tmp/seen.txt flash/seen.txt

          git add flash/seen.txt

          git diff --cached --quiet || git commit -m "Update seen.txt"

          git push origin state