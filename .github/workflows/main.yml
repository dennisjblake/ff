name: Flashfood Bot

on:
  schedule:
    # 08:00–19:59 Detroit (UTC-4 → 12:00–23:59 UTC)
    - cron: "*/3 12-23 * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ подтягиваем seen.txt из branch state
      - name: Load seen.txt from state branch
        run: |
          git fetch origin state || echo "no state branch yet"

          if git show-ref --verify --quiet refs/remotes/origin/state; then
            git checkout origin/state -- flash/seen.txt || echo "no seen.txt in state"
          else
            echo "state branch does not exist yet"
          fi

      # ✅ кеш для Maven (ускоряет сильно)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('flash/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn package -q
        working-directory: flash

      - name: Run bot
        working-directory: flash
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FF_USERNAME: ${{ secrets.FF_USERNAME }}
          FF_PASSWORD: ${{ secrets.FF_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: java -jar target/*.jar

      # ✅ сохраняем seen.txt в отдельную ветку
      - name: Save seen.txt to state branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin state || echo "no state branch yet"

          git checkout state || git checkout -b state

          git add flash/seen.txt

          git diff --cached --quiet || git commit -m "Update seen.txt"

          git push origin state
