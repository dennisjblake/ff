name: Flashfood Bot

on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 Detroit
    - cron: "0 16 * * *"  # 12:00 Detroit
    - cron: "0 20 * * *"  # 16:00 Detroit

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: flashfood-bot
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Загрузить seen.txt из state branch
      - name: Load seen.txt
        run: |
          git fetch origin state || echo "no remote state yet"
          git checkout origin/state -- flash/seen.txt || echo "no seen.txt yet"

      # ✅ Maven cache
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('flash/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn package -q
        working-directory: flash

      - name: Run bot
        working-directory: flash
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FF_USERNAME: ${{ secrets.FF_USERNAME }}
          FF_PASSWORD: ${{ secrets.FF_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: java -jar target/*.jar

      # ✅ Сохранить seen.txt безопасно (без конфликтов)
      - name: Save seen.txt to state branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # забираем актуальное состояние
          git fetch origin state || echo "no remote state yet"

          # переключаемся на state
          git checkout -B state

          # подтягиваем последние изменения (важно против конфликтов)
          git pull origin state --rebase || echo "no remote state yet"

          # добавляем обновлённый файл
          git add flash/seen.txt

          git diff --cached --quiet || git commit -m "Update seen.txt"

          git push origin state
