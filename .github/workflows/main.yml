name: Flashfood Bot

on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 Detroit
    - cron: "0 16 * * *"  # 12:00 Detroit
    - cron: "0 20 * * *"  # 16:00 Detroit

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: flashfood-bot
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Load seen.txt
        run: |
          git fetch origin state || true
          git checkout origin/state -- flash/seen.txt || true

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('flash/pom.xml') }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        run: mvn package -q
        working-directory: flash

      - name: Run bot
        working-directory: flash
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FF_USERNAME: ${{ secrets.FF_USERNAME }}
          FF_PASSWORD: ${{ secrets.FF_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: java -jar target/*.jar

      - name: Save seen.txt
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B state

          git add flash/seen.txt
          git diff --cached --quiet || git commit -m "Update seen.txt"

          git push origin state
